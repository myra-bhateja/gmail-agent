services:
  - type: web
    name: gmail-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SHEET_ID
        sync: false
      - key: SHEET_PUBLIC_URL
        sync: false
      - key: GOOGLE_TOKEN
        sync: false
      - key: GOOGLE_CREDENTIALS
        sync: false